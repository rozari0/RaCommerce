services:
  raco_backend:
    build: .
    env_file:
      - .env
    command: sh ./start.sh
    environment:
      - REDIS_URL=redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    command: ["redis-server"]
